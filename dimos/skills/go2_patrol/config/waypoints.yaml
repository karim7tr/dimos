# Example waypoints configuration file for Go2 patrol
# Modify these coordinates based on your actual environment map

waypoints:
  # Waypoint 1 - Starting position
  - x: 2.0
    y: 0.0
    z: 0.0
    qx: 0.0
    qy: 0.0
    qz: 0.0
    qw: 1.0
  
  # Waypoint 2 - Move forward and turn
  - x: 2.0
    y: 2.0
    z: 0.0
    qx: 0.0
    qy: 0.0
    qz: 0.707
    qw: 0.707
  
  # Waypoint 3 - Continue around
  - x: 0.0
    y: 2.0
    z: 0.0
    qx: 0.0
    qy: 0.0
    qz: 1.0
    qw: 0.0
  
  # Waypoint 4 - Return to start area
  - x: 0.0
    y: 0.0
    z: 0.0
    qx: 0.0
    qy: 0.0
    qz: -0.707
    qw: 0.707

# Add more waypoints as needed for your patrol route
